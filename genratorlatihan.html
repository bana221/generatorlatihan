<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contextual Quest Generator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .glass-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .gradient-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Custom styling for Answer Key section */
        .answer-key-box {
            background-color: #f0fdf4;
            border-left: 4px solid #22c55e;
            padding: 1.5rem;
            margin-top: 2rem;
            border-radius: 0.75rem;
        }

        .explanation-text {
            color: #166534;
            font-size: 0.925rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-3 tracking-tight">
                <i class="fas fa-file-invoice text-indigo-600 mr-3"></i>Smart Quest AI
            </h1>
            <p class="text-slate-600 max-w-2xl mx-auto text-lg">Ubah materi PDF menjadi soal kontekstual (HOTS) secara otomatis dan profesional.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar Input -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 rounded-3xl">
                    <h2 class="text-lg font-bold mb-5 text-slate-800 flex items-center">
                        <i class="fas fa-cog mr-3 text-indigo-500"></i>Pengaturan Generator
                    </h2>
                    
                    <div class="space-y-5">
                        <!-- PDF Upload Section -->
                        <div class="p-4 bg-indigo-50 rounded-2xl border-2 border-dashed border-indigo-200 transition-all hover:bg-indigo-100/50">
                            <label class="block text-sm font-semibold text-indigo-900 mb-2 italic">1. Materi PDF (Opsional)</label>
                            <input type="file" id="pdfFile" accept="application/pdf" class="hidden">
                            <button onclick="document.getElementById('pdfFile').click()" class="w-full py-2.5 px-4 bg-white border border-indigo-300 text-indigo-600 rounded-xl hover:shadow-md transition-all text-sm font-medium flex items-center justify-center">
                                <i class="fas fa-file-pdf mr-2 text-lg"></i> Unggah Materi PDF
                            </button>
                            <div id="pdf-status" class="mt-2 text-xs text-slate-600 font-medium text-center hidden">
                                <i class="fas fa-check-circle text-green-600 mr-1"></i> <span id="pdf-filename" class="truncate max-w-[150px] inline-block align-bottom">materi.pdf</span> terbaca
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Mata Pelajaran / Topik</label>
                            <input type="text" id="subject" placeholder="Contoh: Energi Terbarukan" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Konteks Spesifik</label>
                            <textarea id="context" rows="2" placeholder="Contoh: Penerapan di sekolah atau rumah tangga" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Tipe Soal</label>
                                <select id="type" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer">
                                    <option value="pilihan ganda">Pilihan Ganda</option>
                                    <option value="menjodohkan">Menjodohkan</option>
                                    <option value="esai">Esai</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Level Bloom</label>
                                <select id="level" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer">
                                    <option value="C1">C1 - Mengingat</option>
                                    <option value="C2">C2 - Memahami</option>
                                    <option value="C3">C3 - Aplikasi</option>
                                    <option value="C4" selected>C4 - Analisis</option>
                                    <option value="C5">C5 - Evaluasi</option>
                                    <option value="C6">C6 - Mencipta</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Jumlah Soal</label>
                            <input type="number" id="count" min="1" max="15" value="3" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>

                        <button id="generateBtn" class="w-full gradient-btn text-white font-bold py-4 px-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg">
                            <span id="btnText">Generate Instrumen</span>
                            <div id="btnLoader" class="loader hidden"></div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Result Area -->
            <div class="lg:col-span-8">
                <div class="glass-card p-8 rounded-3xl min-h-[600px] flex flex-col relative overflow-hidden">
                    <div class="flex items-center justify-between mb-6 border-b border-slate-100 pb-4 relative z-10">
                        <div class="flex items-center gap-3">
                            <span class="p-2 bg-indigo-100 text-indigo-600 rounded-lg">
                                <i class="fas fa-file-signature"></i>
                            </span>
                            <h2 class="text-xl font-bold text-slate-800">Draft Soal & Pembahasan</h2>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyToClipboard()" id="copyBtn" class="flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-indigo-600 hover:text-white text-slate-600 rounded-xl transition-all text-sm font-semibold">
                                <i class="fas fa-copy"></i> Salin Semua
                            </button>
                        </div>
                    </div>

                    <div id="outputContainer" class="flex-grow prose prose-slate max-w-none relative z-10">
                        <div class="flex flex-col items-center justify-center h-full text-slate-400 py-20 text-center">
                            <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-6 shadow-inner">
                                <i class="fas fa-wand-sparkles text-4xl opacity-20"></i>
                            </div>
                            <h3 class="text-slate-800 font-bold text-lg">Siap Membuat Soal?</h3>
                            <p class="max-w-xs mx-auto mt-2 text-slate-500">Unggah materi PDF atau tentukan topik, lalu klik "Generate" untuk menyusun instrumen penilaian.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // PENTING: Jika menjalankan di localhost, isi dengan API Key dari Google AI Studio
        const apiKey = "AIzaSyAKTmSeSyS_fqcDl4dMYp_G50kvJq_v3yM"; 

        const outputContainer = document.getElementById('outputContainer');
        const generateBtn = document.getElementById('generateBtn');
        const pdfFileInput = document.getElementById('pdfFile');
        const pdfStatus = document.getElementById('pdf-status');
        const pdfFilenameDisplay = document.getElementById('pdf-filename');

        let extractedPdfText = "";

        pdfFileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            pdfFilenameDisplay.textContent = file.name;
            pdfStatus.classList.remove('hidden');
            
            try {
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    const numPages = Math.min(pdf.numPages, 10);
                    for (let i = 1; i <= numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(' ') + "\n";
                    }
                    extractedPdfText = fullText.trim();
                };
                reader.readAsArrayBuffer(file);
            } catch (err) {
                alert("Gagal membaca PDF");
                pdfStatus.classList.add('hidden');
            }
        });

        async function generateQuestions() {
            const subject = document.getElementById('subject').value;
            const context = document.getElementById('context').value;
            const type = document.getElementById('type').value;
            const level = document.getElementById('level').value;
            const count = document.getElementById('count').value;

            if (!subject && !extractedPdfText) {
                alert("Harap masukkan topik atau upload PDF materi.");
                return;
            }

            setLoadingState(true);

            const systemPrompt = `Anda adalah ahli kurikulum dan asesmen pendidikan. 
            Tugas Anda: Membuat instrumen soal kontekstual (HOTS) yang sangat rapi. 
            Struktur Jawaban WAJIB memiliki bagian 'KUNCI JAWABAN DAN PEMBAHASAN' di akhir yang dipisahkan dengan jelas menggunakan separator garis atau heading yang kuat.
            Pastikan setiap nomor soal memiliki penjelasan nalar mengapa jawaban tersebut benar.`;
            
            let userQuery = `Buatkan ${count} soal ${type} untuk level ${level}.`;
            if (extractedPdfText) userQuery += `\n\nREFERENSI MATERI:\n${extractedPdfText.substring(0, 5000)}`;
            userQuery += `\n\nTopik: ${subject}\nKonteks: ${context || 'Lingkungan kehidupan nyata siswa'}`;
            userQuery += `\n\nATURAN FORMAT OUTPUT:
            1. Gunakan ## untuk Nomor Soal.
            2. Gunakan blok kutipan atau pemisah yang jelas untuk setiap soal.
            3. Bagian akhir harus berjudul "# KUNCI JAWABAN DAN PEMBAHASAN".
            4. Untuk setiap nomor di bagian kunci, tuliskan: "Kunci: [Jawaban] | Pembahasan: [Penjelasan Logika/Nalar]".
            5. Gunakan Markdown Bold untuk poin-poin penting.`;

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                const data = await response.json();
                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (resultText) renderResult(resultText);
                else throw new Error("Gagal mendapatkan jawaban dari AI.");
            } catch (error) {
                renderError(error.message);
            } finally {
                setLoadingState(false);
            }
        }

        async function fetchWithRetry(url, options, retries = 5) {
            let lastError;
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (res.ok) return res;
                    lastError = new Error(`HTTP Error: ${res.status}`);
                } catch (err) {
                    lastError = err;
                }
                // Exponential backoff
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
            throw lastError;
        }

        function setLoadingState(isLoading) {
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            generateBtn.disabled = isLoading;
            if (isLoading) {
                btnText.textContent = "AI Sedang Berpikir...";
                btnLoader.classList.remove('hidden');
                outputContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-indigo-600">
                        <div class="loader w-12 h-12 mb-6 border-4"></div>
                        <p class="animate-pulse font-bold text-lg text-slate-700">Merumuskan Soal Berbasis Konteks...</p>
                        <p class="text-sm text-slate-500 mt-2">Menyinkronkan materi PDF dengan instruksi...</p>
                    </div>
                `;
            } else {
                btnText.textContent = "Generate Instrumen";
                btnLoader.classList.add('hidden');
            }
        }

        function renderResult(text) {
            let html = text
                .replace(/^# KUNCI JAWABAN DAN PEMBAHASAN(.*$)/gim, '<div class="answer-key-box"><h1 class="text-xl font-bold text-green-800 mb-4 flex items-center gap-2"><i class="fas fa-key"></i> KUNCI JAWABAN & PEMBAHASAN</h1>$1</div>')
                .replace(/^# (.*$)/gim, '<h1 class="text-2xl font-black text-indigo-800 mb-6 border-b-2 border-indigo-100 pb-2">$1</h1>')
                .replace(/^## (.*$)/gim, '<h2 class="text-lg font-bold mt-8 mb-4 py-2 px-4 bg-slate-50 rounded-lg border-l-4 border-indigo-500 text-slate-800">$1</h2>')
                .replace(/^\d+\. (.*$)/gim, '<div class="font-bold text-slate-800 mb-2 leading-relaxed">$0</div>')
                .replace(/\*\*(.*)\*\*/gim, '<strong class="text-indigo-700">$1</strong>')
                .replace(/^(A|B|C|D|E)\. (.*$)/gim, '<div class="ml-6 py-1.5 px-3 hover:bg-indigo-50/50 rounded-lg border border-transparent transition-all flex gap-3"><strong>$1.</strong> <span>$2</span></div>')
                .replace(/Pembahasan: (.*$)/gim, '<div class="explanation-text"><strong>Penjelasan:</strong> $1</div>')
                .replace(/\n/g, '<br>');
            
            outputContainer.innerHTML = `<div class="animate-fadeIn">${html}</div>`;
        }

        function renderError(msg) {
            outputContainer.innerHTML = `
                <div class="bg-red-50 p-6 rounded-2xl text-red-700 border border-red-200 flex items-start gap-4">
                    <i class="fas fa-circle-exclamation text-2xl mt-1"></i>
                    <div>
                        <p class="font-bold">Gagal Membuat Soal</p>
                        <p class="text-sm opacity-80">${msg}. Pastikan Anda memiliki koneksi internet dan API key sudah terkonfigurasi dengan benar jika dijalankan secara mandiri.</p>
                    </div>
                </div>
            `;
        }

        function copyToClipboard() {
            const text = outputContainer.innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const copyBtn = document.getElementById('copyBtn');
            const originalHtml = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fas fa-check text-green-400"></i> Berhasil!';
            setTimeout(() => copyBtn.innerHTML = originalHtml, 2000);
        }

        generateBtn.addEventListener('click', generateQuestions);
    </script>

    <style>
        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .prose br {
            display: block;
            content: "";
            margin-top: 0.4rem;
        }
        .answer-key-box br {
            margin-top: 0.2rem;
        }
    </style>
</body>
</html>
